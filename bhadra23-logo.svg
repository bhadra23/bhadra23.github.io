<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Fist icon -->
  <g transform="translate(10, 10)">
    <!-- Raised fist silhouette -->
    <rect x="22" y="50" width="8" height="30" rx="3" fill="url(#fire)" transform="rotate(-8, 26, 65)"/>
    <rect x="32" y="42" width="8" height="38" rx="3" fill="url(#fire)" transform="rotate(-3, 36, 61)"/>
    <rect x="42" y="40" width="8" height="40" rx="3" fill="url(#fire)" transform="rotate(0, 46, 60)"/>
    <rect x="52" y="44" width="8" height="36" rx="3" fill="url(#fire)" transform="rotate(5, 56, 62)"/>
    <!-- Thumb -->
    <rect x="14" y="56" width="14" height="7" rx="3" fill="url(#fire)" transform="rotate(-15, 21, 60)"/>
    <!-- Palm -->
    <rect x="20" y="72" width="42" height="20" rx="6" fill="url(#fire)"/>
    <!-- Wrist -->
    <rect x="24" y="88" width="34" height="12" rx="2" fill="#ef4444" opacity="0.8"/>
  </g>

  <!-- BHADRA text -->
  <text x="105" y="62" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="48" font-weight="900" letter-spacing="-1" fill="white">
    BHADRA
  </text>

  <!-- 23 in accent gradient -->
  <text x="308" y="62" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="52" font-weight="900" letter-spacing="-2" fill="url(#fire)">
    23
  </text>

  <!-- Nepali subtitle -->
  <text x="105" y="88" font-family="'Noto Sans Devanagari', sans-serif" font-size="16" font-weight="600" fill="#8b9dc3" letter-spacing="0.5">
    भादौ २३ &middot; सत्य &middot; न्याय &middot; परिवर्तन
  </text>

  <!-- Tagline -->
  <text x="105" y="108" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#5a6d8e" letter-spacing="3" text-transform="uppercase">
    TRUTH &middot; JUSTICE &middot; CHANGE
  </text>
</svg>